kind = "web"
previewPath = "/"
title = "ScanAR"
version = "1.0.0"
id = "artifacts/scanar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24968

[services.development]
run = "pnpm --filter @workspace/scanar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scanar", "run", "build" ]
publicDir = "artifacts/scanar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24968"
BASE_PATH = "/"
